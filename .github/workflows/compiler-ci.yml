name: Compiler CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: compiler-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cuda:
    name: CUDA backend build and non-GPU tests
    runs-on: ubuntu-24.04
    container:
      image: nvcr.io/nvidia/pytorch:25.09-py3
    timeout-minutes: 360

    env:
      LLVM_REPOSITORY: https://github.com/llvm/llvm-project.git
      LLVM_REF: release/22.x
      LLVM_TARGETS_TO_BUILD: NVPTX;X86;BPF
      LLVM_INSTALL_PREFIX: /usr/local
      LLVM_SOURCE_DIR: /tmp/llvm-project-release-22.x
      LLVM_BUILD_DIR: /tmp/llvm-project-release-22.x/build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install common build dependencies
        run: bash scripts/ci/install_common_deps.sh

      - name: Build LLVM, MLIR, and Clang
        run: bash scripts/ci/build_llvm.sh

      - name: Build and install Ave, then run non-GPU Ninja tests
        run: bash scripts/ci/run_compiler_ci.sh cuda

  rocm:
    name: ROCm backend build and non-GPU tests
    runs-on: ubuntu-24.04
    container:
      image: rocm/pytorch:rocm7.2.2_ubuntu24.04_py3.12_pytorch_release_2.10.0
    timeout-minutes: 360

    env:
      LLVM_REPOSITORY: https://github.com/ROCm/llvm-project.git
      LLVM_REF: rocm-7.2.2
      LLVM_TARGETS_TO_BUILD: AMDGPU;X86;BPF
      LLVM_INSTALL_PREFIX: /usr/local
      LLVM_SOURCE_DIR: /tmp/llvm-project-rocm-7.2.2
      LLVM_BUILD_DIR: /tmp/llvm-project-rocm-7.2.2/build
      LLVM_C_COMPILER: /opt/rocm/llvm/bin/clang
      LLVM_CXX_COMPILER: /opt/rocm/llvm/bin/clang++
      ROCM_PATH: /opt/rocm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install common build dependencies
        run: bash scripts/ci/install_common_deps.sh

      - name: Build LLVM, MLIR, and Clang
        run: bash scripts/ci/build_llvm.sh

      - name: Build and install Ave, then run non-GPU Ninja tests
        run: bash scripts/ci/run_compiler_ci.sh rocm
